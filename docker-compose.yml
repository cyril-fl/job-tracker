services:
  api:
    image: ghcr.io/cyril-fl/job-tracker/api:latest
    volumes:
      - db-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_PATH=/app/data/job-tracker.db
    restart: unless-stopped

  nginx:
    image: ghcr.io/cyril-fl/job-tracker/nginx:latest
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db-data:
